<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>moonforce — Force-Directed Graph Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}
h1 { font-size: 1.5rem; margin-bottom: 8px; color: #64ffda; }
.subtitle { font-size: 0.9rem; color: #888; margin-bottom: 16px; }
canvas {
  border: 1px solid #333;
  border-radius: 8px;
  background: #0d1117;
  cursor: grab;
}
canvas:active { cursor: grabbing; }
.info {
  margin-top: 16px;
  font-size: 0.8rem;
  color: #666;
  text-align: center;
}
a { color: #64ffda; text-decoration: none; }
a:hover { text-decoration: underline; }
</style>
</head>
<body>
<h1>moonforce</h1>
<p class="subtitle">d3-force port for MoonBit | WASM-GC computed layout
  | <a href="https://github.com/Kai-Junhan/moonforce">GitHub</a></p>
<canvas id="canvas" width="800" height="600"></canvas>
<div class="info" id="info">Loading WASM...</div>
<script>
(function() {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var info = document.getElementById('info');
  var colors = ['#64ffda','#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6f91','#845ec2','#ffc75f','#f9f871','#ff9671','#d65db1','#00c9a7'];
  var nodeCount = 0, edgeCount = 0;
  var nodeX = [], nodeY = [], edgeSrc = [], edgeTgt = [];
  var dispX = [], dispY = [];
  var animProgress = 0, dragging = -1, dragOffX = 0, dragOffY = 0;

  var importObject = { env: {
    setGraphSize: function(n, e) {
      nodeCount = n; edgeCount = e;
      for (var i = 0; i < n; i++) { dispX[i] = 400; dispY[i] = 300; }
    },
    setNode: function(i, x, y) { nodeX[i] = x; nodeY[i] = y; },
    setEdge: function(i, s, t) { edgeSrc[i] = s; edgeTgt[i] = t; },
    render: function() {
      info.textContent = nodeCount + ' nodes, ' + edgeCount + ' edges. Layout by MoonBit WASM-GC. Drag nodes to move.';
      animProgress = 0; animate();
    }
  }};

  function animate() {
    animProgress = Math.min(1, animProgress + 0.03);
    var t = 1 - Math.pow(1 - animProgress, 3);
    for (var i = 0; i < nodeCount; i++) {
      if (i === dragging) continue;
      dispX[i] = 400 + (nodeX[i] - 400) * t;
      dispY[i] = 300 + (nodeY[i] - 300) * t;
    }
    draw();
    if (animProgress < 1) requestAnimationFrame(animate);
  }

  function draw() {
    ctx.clearRect(0, 0, 800, 600);
    ctx.strokeStyle = 'rgba(100,255,218,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (var i = 0; i < edgeCount; i++) {
      ctx.moveTo(dispX[edgeSrc[i]], dispY[edgeSrc[i]]);
      ctx.lineTo(dispX[edgeTgt[i]], dispY[edgeTgt[i]]);
    }
    ctx.stroke();
    for (var i = 0; i < nodeCount; i++) {
      ctx.beginPath();
      ctx.arc(dispX[i], dispY[i], 7, 0, Math.PI * 2);
      ctx.fillStyle = colors[i % colors.length];
      ctx.fill();
      if (i === dragging) { ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke(); }
    }
  }

  canvas.addEventListener('mousedown', function(e) {
    var r = canvas.getBoundingClientRect(), mx = e.clientX-r.left, my = e.clientY-r.top;
    for (var i = nodeCount-1; i >= 0; i--) {
      if ((dispX[i]-mx)*(dispX[i]-mx)+(dispY[i]-my)*(dispY[i]-my) < 200) {
        dragging = i; dragOffX = dispX[i]-mx; dragOffY = dispY[i]-my; return;
      }
    }
  });
  canvas.addEventListener('mousemove', function(e) {
    if (dragging >= 0) {
      var r = canvas.getBoundingClientRect();
      dispX[dragging] = e.clientX-r.left+dragOffX;
      dispY[dragging] = e.clientY-r.top+dragOffY;
      draw();
    }
  });
  canvas.addEventListener('mouseup', function() { dragging = -1; });
  canvas.addEventListener('mouseleave', function() { dragging = -1; });

  async function loadWasm() {
    try {
      var paths = ['../_build/wasm-gc/debug/build/web/web.wasm','../_build/wasm-gc/release/build/web/web.wasm','./web.wasm'];
      var resp = null;
      for (var p of paths) { try { resp = await fetch(p); if (resp.ok) break; } catch(e){} }
      if (!resp || !resp.ok) throw new Error('WASM not found. Run: moon build --target wasm-gc');
      var { instance } = await WebAssembly.instantiateStreaming(resp, importObject);
      instance.exports._start();
    } catch(e) { info.textContent = 'Error: ' + e.message; console.error(e); }
  }
  loadWasm();
})();
</script>
</body>
</html>
