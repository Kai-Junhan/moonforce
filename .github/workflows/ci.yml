name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hustcer/setup-moonbit@v1
      - name: Check
        run: moon check
      - name: Format check
        run: moon fmt --check
      - name: Test
        run: moon test
      - name: Build demo
        run: moon build cmd/main
      - name: Build examples
        run: |
          moon build examples/random_graph
          moon build examples/tree_layout
          moon build examples/radial_layout
          moon build examples/grid_layout
          moon build examples/cluster
